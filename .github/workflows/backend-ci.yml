name: Backend CI

on:
  push:
    branches: [main, master, develop]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      DATABASE_URL: sqlite:///./ci.db
      RATE_LIMIT_ENABLED: "false"
      ENVIRONMENT: local
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check app --select F,I

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing -q

      - name: Verify Alembic migration applies
        run: alembic upgrade head

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-real-estate-matchmaker-backend:ci backend
